<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="printer-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#424242"/>
      <stop offset="100%" style="stop-color:#212121"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient)"/>

  <!-- 3D Printer Body -->
  <g transform="translate(96, 80)">
    <!-- Main Frame -->
    <rect x="40" y="60" width="240" height="220" rx="8" fill="url(#printer-gradient)" stroke="#616161" stroke-width="3"/>

    <!-- Build Plate -->
    <rect x="70" y="200" width="180" height="12" rx="2" fill="#78909c"/>
    <rect x="80" y="195" width="160" height="8" rx="1" fill="#90a4ae"/>

    <!-- Print Head Rail -->
    <rect x="50" y="80" width="220" height="8" rx="2" fill="#616161"/>

    <!-- Print Head -->
    <g transform="translate(140, 85)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#ff6f00"/>
      <rect x="5" y="45" width="30" height="20" rx="2" fill="#e65100"/>
      <circle cx="20" cy="70" r="4" fill="#ffab00"/>
    </g>

    <!-- Filament Spool Holder -->
    <rect x="260" y="40" width="20" height="100" rx="4" fill="#424242"/>
    <circle cx="270" cy="20" r="25" fill="#29b6f6" stroke="#0288d1" stroke-width="3"/>
    <circle cx="270" cy="20" r="8" fill="#424242"/>

    <!-- Screen -->
    <rect x="60" y="240" width="80" height="30" rx="4" fill="#263238"/>
    <rect x="65" y="245" width="70" height="20" rx="2" fill="#00e676"/>

    <!-- Control Buttons -->
    <circle cx="180" cy="255" r="8" fill="#f44336"/>
    <circle cx="205" cy="255" r="8" fill="#4caf50"/>
    <circle cx="230" cy="255" r="8" fill="#2196f3"/>

    <!-- Printed Object (Layer lines) -->
    <g transform="translate(130, 140)">
      <rect x="0" y="50" width="60" height="4" rx="1" fill="#ffca28"/>
      <rect x="2" y="45" width="56" height="4" rx="1" fill="#ffc107"/>
      <rect x="4" y="40" width="52" height="4" rx="1" fill="#ffb300"/>
      <rect x="6" y="35" width="48" height="4" rx="1" fill="#ffa000"/>
      <rect x="8" y="30" width="44" height="4" rx="1" fill="#ff8f00"/>
      <rect x="10" y="25" width="40" height="4" rx="1" fill="#ff6f00"/>
    </g>

    <!-- Frame Uprights -->
    <rect x="40" y="40" width="12" height="240" rx="2" fill="#37474f"/>
    <rect x="268" y="40" width="12" height="240" rx="2" fill="#37474f"/>

    <!-- Top Bar -->
    <rect x="40" y="40" width="240" height="12" rx="2" fill="#37474f"/>
  </g>

  <!-- Anycubic Text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">ANYCUBIC</text>
  <text x="256" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">KOBRA</text>
</svg>
